name: harness-ci

# Runs the harness self-tests (gate, idempotency, sandbox, e2e) on every push/PR.
# Data-dependent steps (real Cactus, genomes) are skipped automatically by
# verify.sh in a data-less checkout; the e2e uses tiny synthetic inputs + a
# mock Cactus toolchain, so it runs in CI.

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bubblewrap samtools

      - name: Run verify.sh (all self-tests)
        run: bash verify.sh
